<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Lap-Time Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>F1 Lap-Time Simulator</h1>
    <p class="sub">Quasi-steady-state lap sim &middot; friction-circle grip model</p>
  </header>

  <main>
    <section class="stage">
      <canvas id="track" width="760" height="560"></canvas>
      <div class="readout">
        <div class="stat"><span id="laptime">--.--</span><label>lap time (s)</label></div>
        <div class="stat"><span id="speed">--</span><label>speed (kph)</label></div>
        <div class="stat"><span id="topspeed">--</span><label>top (kph)</label></div>
      </div>
    </section>

    <aside class="controls">
      <label>Track
        <select id="trackSel">
          <option value="circuit">Circuit</option>
          <option value="oval">Oval</option>
        </select>
      </label>

      <label>Grip (g)<output id="gripOut">3.5</output>
        <input type="range" id="grip" min="1.5" max="5" step="0.1" value="3.5" />
      </label>

      <label>Power (kW)<output id="powerOut">735</output>
        <input type="range" id="power" min="300" max="1000" step="10" value="735" />
      </label>

      <label>Mass (kg)<output id="massOut">798</output>
        <input type="range" id="mass" min="600" max="1100" step="10" value="798" />
      </label>

      <label>Downforce / drag<output id="dragOut">1.10</output>
        <input type="range" id="drag" min="0.4" max="2.0" step="0.05" value="1.10" />
      </label>

      <button id="run">Run lap</button>
      <p class="legend">slow&nbsp;<span class="bar"></span>&nbsp;fast</p>
      <p class="hint" id="hint"></p>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
